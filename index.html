<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

    <meta name="description" content="Real-time cloud infrastructure monitoring from Frankfurt Data Center. Encrypted connections, zero downtime, global reach.">
    <meta name="keywords" content="cloud monitoring, frankfurt data center, network traffic, cloud infrastructure, mosych cloud">
    <meta name="author" content="leenmosy">
    <meta name="robots" content="index, follow">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Mosych Cloud - Real-time Cloud Infrastructure Monitoring">
    <meta property="og:description" content="Real-time cloud infrastructure monitoring from Frankfurt Data Center">
    <meta property="og:url" content="https://mosych.cloud/">
    <meta property="og:image" content="https://mosych.cloud/img/background.png">
    <meta property="og:image:alt" content="Mosych Cloud - cloud infrastructure monitoring">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Mosych Cloud">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="Mosych Cloud">

    <meta name="theme-color" content="#181717">
    <meta name="msapplication-TileColor" content="#181717">
    <meta name="msapplication-navbutton-color" content="#181717">
    <meta name="apple-mobile-web-app-status-bar-style" content="#181717">
    <meta name="status-bar-style" content="#181717">
    <meta name="browser-status-bar-style" content="#181717">

    <link rel="preconnect" href="https://www.gstatic.com">
    <link rel="preconnect" href="https://mosychcloud-default-rtdb.europe-west1.firebasedatabase.app">

    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">

    <title>Mosych Cloud</title>

    <link rel="stylesheet" href="style.css">

    <script defer src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body>
    <div class="noise"></div>

    <div id="loading-screen" class="loading-screen">
        <div class="loading-container">
            <div class="loading-text">Loading</div>
            <div class="loading-progress-bar">
                <div class="loading-progress-fill" id="loading-progress"></div>
            </div>
        </div>
    </div>

    <main class="container">
        <section class="home" id="home">
            <div class="home-glow"></div>
            <header class="home-header">
                <h1 class="home-title">
                    <span class="mosych">Mosych</span> <br>
                    <span class="cloud invisible">Cloud</span>
                </h1>
            </header>
            <div class="blocks-wrapper">
                <div class="block block-1"></div>
                <div class="block block-2">
                    <div class="block-2-country">
                        <div class="block-2-country-text">Germany</div>
                    </div>
                    <div class="block-2-home-description">
                        <div class="block-2-home-description-text">Cloud Infrastructure <br> Secure Connection</div>
                    </div>
                </div>
                <div class="block block-3">
                    <div class="glow-line-top"></div>
                    <div class="block-3-logo">
                        <div class="block-3-logo-svg"></div>
                    </div>
                    <div class="block-3-sponsor">
                        <div class="block-3-sponsor-text">Namesilo | GitHub</div>
                    </div>
                </div>
                <div class="block block-4">
                    <div class="block-4-city">
                        <div class="block-4-city-text">Frankfurt am Main</div>
                    </div>
                    <div class="block-4-button-metrics" id="metrics-link">
                        <div class="block-4-button-metrics-text">Metrics ⭣</div>
                    </div>
                </div>
                <div class="block block-5"></div>
            </div>
        </section>

        <section class="metrics" id="metrics">
            <div class="glow-metrics"></div>
            <header class="metrics-header">
                <h1 class="metrics-title">METRICS</h1>
            </header>
            <div class="blocks-wrapper">
                <div class="block block-1"></div>
                <div class="block block-2">
                    <div class="block-2-button-home" id="home-link">
                        <div class="block-2-button-home-text">⭡ Home</div>
                    </div>
                    <div class="block-2-tunnel">
                        <div class="block-2-tunnel-value">
                            <div id="tunnels">0</div>
                            <div class="block-2-tunnel-text">Active Tunnels</div>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="tunnels-progress" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
                <div class="block block-3">
                    <div class="glow-line-bottom"></div>
                    <div class="block-3-time">
                        <div class="block-3-time-text" id="local-time">--:--:--</div>
                    </div>
                    <div class="block-3-tb">
                        <div class="block-3-tb-value">
                            <div id="total-data">0.00 TB</div>
                            <div class="block-3-tb-text">Total Data Processed</div>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="data-progress" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
                <div class="block block-4">
                    <div class="block-4-metrics-description">
                        <div class="block-4-metrics-description-text">Real-Time Monitoring <br> Network Performance Tracking</div>
                    </div>
                    <div class="block-4-gbps">
                        <div class="block-4-gbps-value">
                            <div id="current-speed">0.00 GBPS</div>
                            <div class="block-4-gbps-text">Current Throughput</div>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="speed-progress" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
                <div class="block block-5"></div>
            </div>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
